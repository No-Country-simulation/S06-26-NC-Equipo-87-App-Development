name: API CI

on:
  push:
    paths:
      - 'api/**'
      - '.github/workflows/api-ci-cd.yml'
  pull_request:
    paths:
      - 'api/**'
      - '.github/workflows/api-ci-cd.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: api

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('api/**/*.csproj', 'api/api.slnx') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore api.slnx

      - name: Build Solution
        run: dotnet build api.slnx --no-restore

      - name: Upload Build Output
        uses: actions/upload-artifact@v4
        with:
          name: api-build-output
          path: api/
          retention-days: 1

  lint:
    name: Format Checks
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Build Output
        uses: actions/download-artifact@v4
        with:
          name: api-build-output
          path: api

      - name: Run Format Check
        run: dotnet format --verify-no-changes api.slnx

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Build Output
        uses: actions/download-artifact@v4
        with:
          name: api-build-output
          path: api

      - name: Run Unit Tests
        run: dotnet test tests/api.UnitTests/api.UnitTests.csproj --no-build

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Build Output
        uses: actions/download-artifact@v4
        with:
          name: api-build-output
          path: api

      - name: Run Integration Tests
        run: dotnet test tests/api.IntegrationTests/api.IntegrationTests.csproj --no-build

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    needs: [lint, test-unit, test-integration]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker Auth
        run: gcloud auth configure-docker --quiet

      - name: Build and push image
        run: |
          IMAGE_TAG="gcr.io/${{ secrets.GCP_PROJECT_ID }}/ops-core-api:${{ github.sha }}"
          docker build -t $IMAGE_TAG .
          docker push $IMAGE_TAG

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ops-core-api
          image: gcr.io/${{ secrets.GCP_PROJECT_ID }}/ops-core-api:${{ github.sha }}
          region: ${{ secrets.GCP_REGION }}
          flags: '--allow-unauthenticated --port=8080'
          env_vars: |
            ConnectionStrings__DefaultConnection=${{ secrets.DATABASE_URL }}
