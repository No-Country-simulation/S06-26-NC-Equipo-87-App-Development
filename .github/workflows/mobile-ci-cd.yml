name: Mobile App CI/CD

on:
  push:
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-ci-cd.yml'
  pull_request:
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-ci-cd.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: mobile

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: 'mobile/package-lock.json'

      - name: Cache Node Modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: mobile/node_modules
          key: mobile-node-modules-${{ runner.os }}-${{ hashFiles('mobile/package-lock.json') }}
          restore-keys: |
            mobile-node-modules-${{ runner.os }}-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

  lint:
    name: Format Checks
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Restore Node Modules
        uses: actions/cache/restore@v4
        with:
          path: mobile/node_modules
          key: mobile-node-modules-${{ runner.os }}-${{ hashFiles('mobile/package-lock.json') }}
          fail-on-cache-miss: true

      - name: Run Linter
        run: npm run lint

      - name: TypeScript compiler check
        run: npx tsc --noEmit

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Restore Node Modules
        uses: actions/cache/restore@v4
        with:
          path: mobile/node_modules
          key: mobile-node-modules-${{ runner.os }}-${{ hashFiles('mobile/package-lock.json') }}
          fail-on-cache-miss: true

      - name: Run Jest tests
        run: npm run test

  release-android:
    name: Publish APK Release
    runs-on: ubuntu-latest
    needs: [lint, test-unit]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    environment: production
    permissions:
      contents: write
    env:
      EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Restore Node Modules
        uses: actions/cache/restore@v4
        with:
          path: mobile/node_modules
          key: mobile-node-modules-${{ runner.os }}-${{ hashFiles('mobile/package-lock.json') }}
          fail-on-cache-miss: true

      - name: Prebuild Android - Generate the native Android folder using prebuild
        run: npx expo prebuild --platform android --no-install

      - name: Cache Gradle - Set up Gradle cache for faster builds
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
 
      - name: Build Android Release APK - Build the release APK
        working-directory: mobile/android
        run: ./gradlew assembleRelease

      - name: Sign Android Release APK - Generate a temporary keystore and sign the APK so it is installable on devices
        run: |
          # Create a keystore
          keytool -genkey -v -keystore my-release-key.keystore -alias my-key-alias -keyalg RSA -keysize 2048 -validity 10000 -storepass mypassword -keypass mypassword -dname "CN=OpsCore, O=OpsCore, C=US"
          
          # Find the built APK (could be app-release.apk or app-release-unsigned.apk)
          APK_PATH=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: No APK file found to sign!"
            exit 1
          fi
          echo "Found APK to sign: $APK_PATH"
          
          # Find apksigner in Android SDK build-tools
          APKSIGNER_PATH=$(find $ANDROID_HOME/build-tools/ -name "apksigner" | sort -V | tail -n 1)
          if [ -z "$APKSIGNER_PATH" ]; then
            echo "Error: apksigner not found in $ANDROID_HOME/build-tools/"
            exit 1
          fi
          echo "Found apksigner at: $APKSIGNER_PATH"
          
          # Sign the APK using apksigner
          "$APKSIGNER_PATH" sign --ks my-release-key.keystore --ks-key-alias my-key-alias --ks-pass pass:mypassword --key-pass pass:mypassword --out android/app/build/outputs/apk/release/app-release-signed.apk "$APK_PATH"
          
          # Clean up temporary keystore and replace the original APKs with the signed one
          rm -f my-release-key.keystore
          rm -f "$APK_PATH"
          mv android/app/build/outputs/apk/release/app-release-signed.apk android/app/build/outputs/apk/release/app-release.apk

      - name: Verify APK build output - Sanity check validation of APK size and presence
        run: |
          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "Error: app-release.apk was not found!"
            exit 1
          fi
          SIZE=$(wc -c < "$APK_PATH")
          echo "APK size: $SIZE bytes"
          if [ "$SIZE" -lt 10485760 ]; then
            echo "Error: APK file size is too small ($SIZE bytes), build might be corrupted or empty!"
            exit 1
          fi
          echo "APK validated successfully."

      - name: Upload APK artifact for release job
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 1

  release-ios:
    name: Publish IPA Release
    runs-on: macos-latest
    needs: [lint, test-unit]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    environment: production
    permissions:
      contents: write
    env:
      EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: 'mobile/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Prebuild iOS - Generate the native iOS folder using prebuild
        run: npx expo prebuild --platform ios --no-install

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: mobile/ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('mobile/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install CocoaPods dependencies
        working-directory: mobile/ios
        run: pod install --repo-update

      - name: Resolve scheme name from xcworkspace
        run: |
          SCHEME=$(ls ios/*.xcworkspace 2>/dev/null | head -n 1 | xargs basename | sed 's/.xcworkspace//')
          if [ -z "$SCHEME" ]; then
            echo "Error: No .xcworkspace found in ios/"
            exit 1
          fi
          echo "Using scheme: $SCHEME"
          echo "SCHEME=$SCHEME" >> $GITHUB_ENV

      - name: Create ExportOptions.plist - Configure unsigned development export for CI
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>compileBitcode</key>
            <false/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>iPhone Developer</string>
          </dict>
          </plist>
          EOF

      - name: Build iOS Archive - Build and archive the iOS app (unsigned)
        working-directory: mobile/ios
        run: |
          xcodebuild archive \
            -workspace "${{ env.SCHEME }}.xcworkspace" \
            -scheme "${{ env.SCHEME }}" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/OpsCore.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true

      - name: Export IPA - Package the archive into a distributable IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/OpsCore.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/ipa" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true

          # Fallback: manually zip the .app into an IPA if xcodebuild export failed due to missing signing identity
          if [ ! -f "$RUNNER_TEMP/ipa/"*.ipa ]; then
            echo "xcodebuild export did not produce an IPA. Creating IPA manually from archive..."
            mkdir -p "$RUNNER_TEMP/ipa/Payload"
            cp -r "$RUNNER_TEMP/OpsCore.xcarchive/Products/Applications/"*.app "$RUNNER_TEMP/ipa/Payload/"
            cd "$RUNNER_TEMP/ipa"
            zip -r "OpsCore.ipa" Payload
          fi

      - name: Verify IPA build output - Sanity check validation of IPA size and presence
        run: |
          IPA_PATH=$(find "$RUNNER_TEMP/ipa" -name "*.ipa" | head -n 1)
          if [ -z "$IPA_PATH" ]; then
            echo "Error: No IPA file was found!"
            exit 1
          fi
          SIZE=$(wc -c < "$IPA_PATH")
          echo "IPA path: $IPA_PATH"
          echo "IPA size: $SIZE bytes"
          if [ "$SIZE" -lt 1048576 ]; then
            echo "Error: IPA file size is too small ($SIZE bytes), build might be corrupted or empty!"
            exit 1
          fi
          echo "IPA validated successfully."
          # Normalize to a predictable filename for the upload step
          cp "$IPA_PATH" "$RUNNER_TEMP/ipa/OpsCore.ipa"

      - name: Upload IPA artifact for release job
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ runner.temp }}/ipa/OpsCore.ipa
          retention-days: 1

  publish-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [release-android, release-ios]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Restore Node Modules
        uses: actions/cache/restore@v4
        with:
          path: mobile/node_modules
          key: mobile-node-modules-${{ runner.os }}-${{ hashFiles('mobile/package-lock.json') }}
          fail-on-cache-miss: false

      - name: Download Android APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: dist/android

      - name: Download iOS IPA artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa
          path: dist/ios

      - name: Get Version - Read version from package.json with validation and fallback
        id: get_version
        run: |
          VERSION=$(node -p "const pkg = require('./package.json'); (pkg && pkg.version) ? pkg.version : '1.0.0'")
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Warning: Version '$VERSION' is not a valid semver. Using fallback 1.0.0"
            VERSION="1.0.0"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and Upload artifacts - Publish APK and IPA to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}-build-${{ github.run_number }}
          name: Release v${{ steps.get_version.outputs.version }} (Build #${{ github.run_number }})
          body: |
            Automated production build for the OpsCore mobile application.

            | Platform | Artifact |
            |----------|----------|
            | Android | `app-release.apk` |
            | iOS     | `OpsCore.ipa` (unsigned - sideload via AltStore / TestFlight manual upload) |

            - **Commit**: ${{ github.sha }}
            - **Triggered by**: ${{ github.actor }}
          files: |
            dist/android/app-release.apk
            dist/ios/OpsCore.ipa
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
