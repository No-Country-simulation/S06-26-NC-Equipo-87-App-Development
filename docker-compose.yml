services:
  db:
    image: postgres:17-alpine
    container_name: opscore-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: opscore
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d opscore"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: opscore-api
    container_name: opscore-api
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: Host=db;Database=opscore;Username=postgres;Password=postgres
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
